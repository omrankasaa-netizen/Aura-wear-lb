<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Perf: warm up connections to the Meta Pixel host and the product-image
         CDN so the first ad-click paint doesn't stall on DNS/TLS. dns-prefetch
         is the fallback for browsers that ignore preconnect. -->
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />
    <link rel="preconnect" href="https://pub-ab3852beb0cd42559c87746c47032c7a.r2.dev" crossorigin />
    <link rel="dns-prefetch" href="https://pub-ab3852beb0cd42559c87746c47032c7a.r2.dev" />

    <!-- Primary SEO -->
    <title>AURA | Men's Apparel Lebanon</title>
    <meta name="description" content="AURA — clean fits, limited drops, delivered across Lebanon. Shop men's tees, polos, jeans and matching sets. Cash on delivery available." />
    <meta name="keywords" content="men's clothing lebanon, mens apparel beirut, oversized tees, polos, jeans, matching sets, aura wear lb" />
    <meta name="author" content="AURA" />
    <link rel="canonical" href="https://aura-lb.shop/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aura-lb.shop/" />
    <meta property="og:title" content="AURA | Men's Apparel Lebanon" />
    <meta property="og:description" content="Level up your aura. Clean fits. Limited drops. Delivered across Lebanon. Cash on delivery available." />
    <meta property="og:image" content="https://aura-lb.shop/brand/aura-icon-512.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_AR" />
    <meta property="og:site_name" content="AURA" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AURA | Men's Apparel Lebanon" />
    <meta name="twitter:description" content="Level up your aura. Clean fits. Limited drops. Delivered across Lebanon." />
    <meta name="twitter:image" content="https://aura-lb.shop/brand/aura-icon-512.png" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#111111" />

    <!-- Branded splash shown until React mounts (replaced automatically).
         Colors mirror src/index.css light theme so there's no flash. -->
    <style>
      #aura-splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#FAF8F4;color:#0E0E0E;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;text-align:center;padding:24px}
      #aura-splash .aura-mark{font-size:clamp(2.2rem,10vw,3.2rem);font-weight:600;letter-spacing:.42em;margin:0 0 0 .42em}
      #aura-splash .aura-tag{font-size:.72rem;letter-spacing:.32em;margin:14px 0 0 .32em;color:#6B6A66;text-transform:uppercase}
      #aura-splash .aura-bar{width:120px;height:2px;margin-top:28px;background:#D8D2C7;overflow:hidden;border-radius:2px}
      #aura-splash .aura-bar::before{content:"";display:block;width:40%;height:100%;background:#5A5E45;animation:aura-slide 1.1s ease-in-out infinite}
      @keyframes aura-slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
      @media (prefers-reduced-motion:reduce){#aura-splash .aura-bar::before{animation:none;width:100%}}
      .aura-noscript{max-width:420px;margin:40vh auto 0;padding:24px;text-align:center;font-family:ui-sans-serif,system-ui,sans-serif;background:#FAF8F4;color:#0E0E0E}
      .aura-noscript strong{letter-spacing:.3em}
    </style>
  </head>
  <body style="background:#FAF8F4">
    <div id="root">
      <div id="aura-splash" role="status" aria-label="AURA is loading">
        <div class="aura-mark">AURA</div>
        <div class="aura-tag">Level up your aura</div>
        <div class="aura-bar"></div>
      </div>
    </div>
    <noscript>
      <div class="aura-noscript">
        <strong>AURA</strong>
        <p>Please enable JavaScript to shop AURA — clean fits, limited drops, delivered across Lebanon.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
